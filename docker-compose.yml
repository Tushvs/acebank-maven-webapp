services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: acebank_lite
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://db:3306/acebank_lite?allowPublicKeyRetrieval=true&useSSL=false"
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_SCRIPT_PATH: /sql/schema_initializer.sql
      DB_MYSQL_DRIVER: com.mysql.cj.jdbc.Driver
    ports:
      - "8080:8080"

volumes:
  db_data: